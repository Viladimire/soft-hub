name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 10

    steps:
      - name: Check Node.js and npm versions
        run: |
          node --version
          npm --version
          echo "CI: $CI"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: Setup pnpm (if needed)
        run: |
          if ! command -v pnpm &> /dev/null; then
            echo "pnpm not found, skipping..."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON
        run: npm run validate-json

      - name: Security Scan
        run: |
          npm audit --audit-level=high
          npx next info
          node scripts/audit-log.js "build_started"
          echo "Security scan completed successfully"

      - name: Build
        run: npm run build

      - name: Export
        run: npm run export

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
